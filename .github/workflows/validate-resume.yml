# .github/workflows/validate-resume.yml
name: Validate resume data

on:
  pull_request:
    paths:
      - "client/src/data/resume.master.json"
      - "client/src/types/resume.ts"
      - "client/src/utils/validateResumeData.ts"
      - "client/scripts/validate-resume.ts"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run validate:resume