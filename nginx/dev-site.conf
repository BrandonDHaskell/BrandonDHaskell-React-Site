# dev-site.conf
#
# Mirrors production: all traffic proxies to the Go server.
# No TLS — that's handled by Cloudflare in prod.

upstream go_server {
    server prod_server:4000;
}

server {
    listen 80;
    server_name _;

    # Proxy everything to the Go server (same as prod)
    location / {
        proxy_pass http://go_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check for Nginx itself
    location /nginx-healthz {
        return 200 "ok\n";
    }
}