# nginx/prod-site.conf
#
# Cloudflare handles public TLS termination and HTTP -> HTTPS redirects.
# This server uses a Cloudflare Origin Certificate for the encrypted
# connection between Cloudflare and this origin (Full Strict mode).

upstream go_server {
    server 127.0.0.1:4000;
}

# Reject direct HTTP requests that bypass Cloudflare
server {
    listen 80;
    server_name brandondhaskell.com www.brandondhaskell.com;
    return 444;
}

server {
    listen 443 ssl;
    server_name brandondhaskell.com www.brandondhaskell.com;

    # Cloudflare Origin Certificate (15-year rotation)
    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin-key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Compress text-based responses at the origin.
    # Cloudflare compresses at the edge too, but gzip here reduces
    # origin → Cloudflare bandwidth and speeds up cache fills.
    # Already-compressed formats (webp, png, woff2) are excluded via gzip_types.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Static assets — long-lived cache since filenames are hashed by Webpack
    location ~* \.(js|css|webp|png|jpg|jpeg|svg|gif|ico|woff|woff2|ttf|eot)$ {
        proxy_pass http://go_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # All other requests proxy to the Go server (API + SPA fallback)
    location / {
        proxy_pass http://go_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check for Nginx itself
    location /nginx-healthz {
        return 200 "ok\n";
    }
}