services:
  # Step 1: Build the React client — runs once, then exits
  client:
    build:
      context: ./client
      dockerfile: ../docker/client.Dockerfile
    # Copy build output into the shared volume and exit
    command: >
      sh -c "cp -r /app/build/* /static/ && echo 'Client build copied to /static'"
    volumes:
      - client_build:/static

  # Step 2: Go server serves static files + API (mirrors EC2)
  server:
    build:
      context: ./server
      dockerfile: ../docker/server.Dockerfile
    depends_on:
      client:
        condition: service_completed_successfully
    volumes:
      - client_build:/static:ro
    expose:
      - "4000"
    environment:
      - GO_ENV=production
      - PORT=4000
      - STATIC_DIR=/static
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    stop_grace_period: 20s

  # Step 3: Nginx reverse proxy (mirrors EC2 minus TLS)
  nginx:
    image: nginx:1.26.3
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - ./nginx/dev-site.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    stop_grace_period: 10s

volumes:
  client_build: